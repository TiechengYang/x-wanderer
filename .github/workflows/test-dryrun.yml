name: Test Dry Run Mode

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-dry-run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Dry Run Mode (headless test)
      run: |
        timeout 30 python main_dryrun.py || echo "Dry run completed (timeout is expected for long-running agent)"
      env:
        # No real API keys needed for dry run
        PYTHONUNBUFFERED: 1
